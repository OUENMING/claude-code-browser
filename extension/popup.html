<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 280px; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 13px; background: #faf9f5; color: #141413; }
    h1 { font-size: 14px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
    .row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid rgba(0,0,0,0.06); }
    .label { color: #666; }
    .status { font-weight: 500; }
    .connected { color: #4CAF50; }
    .disconnected { color: #f44336; }
    button { width: 100%; padding: 8px 12px; margin-top: 8px; border: 1px solid rgba(0,0,0,0.2); border-radius: 6px; background: #fff; font-size: 13px; cursor: pointer; text-align: center; }
    button:hover { background: #f5f4f0; }
    button.primary { background: #141413; color: #fff; border: none; }
    button.primary:hover { background: #333; }
    button.danger { color: #f44336; border-color: #f44336; }
    button.danger:hover { background: #fff5f5; }
    input { width: 100%; padding: 6px 8px; border: 1px solid rgba(0,0,0,0.2); border-radius: 4px; font-size: 12px; text-align: center; }
    .hint { font-size: 11px; color: #999; margin-top: 4px; text-align: center; }
  </style>
</head>
<body>
  <h1>🌐 Claude Code 浏览器</h1>
  <div class="row">
    <span class="label">连接状态</span>
    <span id="ws-status" class="status disconnected">未连接</span>
  </div>
  <div class="row">
    <span class="label">当前标签页</span>
    <span id="tab-info" class="status" style="font-size:12px;">—</span>
  </div>
  <div style="margin-top:8px;">
    <div class="row" style="border:none; padding-bottom:2px;">
      <span class="label">端口</span>
    </div>
    <input type="number" id="port-input" value="19222" min="1024" max="65535">
    <div class="hint">需与 MCP Server 端口一致</div>
  </div>
  <button id="save-port-btn" class="primary" style="margin-top:6px;">保存端口并连接</button>
  <button id="disconnect-tab-btn" class="danger">断开当前标签页</button>
  <script src="popup.js"></script>
</body>
</html>
